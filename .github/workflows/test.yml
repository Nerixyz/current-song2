name: Test

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: latest

      - uses: pnpm/action-setup@v6
        name: Install pnpm
        id: pnpm-install
        with:
          version: 11.10.0
          run_install: false

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm run --if-present -r typecheck

      - name: Test
        run: pnpm run --if-present -r test
